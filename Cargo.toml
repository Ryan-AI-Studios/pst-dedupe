[workspace]
resolver = "2"
members = [
    "crates/pst-reader",
    "crates/dedup-engine",
    "crates/pst-dedup-gui",
]

[workspace.dependencies]
# PST reader
byteorder = "1.5"
thiserror = "2"
crc32fast = "1.4"
tracing = "0.1"

# Dedup engine
sha2 = "0.10"
csv = "1.3"
chrono = "0.4"

# GUI
eframe = "0.31"
rfd = "0.15"

# Shared
tracing-subscriber = "0.3"
