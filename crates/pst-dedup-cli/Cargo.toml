[package]
name = "pst-dedup-cli"
version = "0.1.0"
edition = "2021"
description = "Command-line surface for PST deduplication and headless matter automation"
license = "LicenseRef-Proprietary"
license-file = "../../LICENSE"

[[bin]]
name = "pst-dedup"
path = "src/main.rs"

[dependencies]
pst-reader = { path = "../pst-reader" }
dedup-engine = { path = "../dedup-engine" }
matter-core = { path = "../matter-core" }
matter-service = { path = "../matter-service" }
matter-platform = { path = "../matter-platform" }
process-runner = { path = "../process-runner" }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
camino = { workspace = true }
ctrlc = "3.5"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "signal"] }

[dev-dependencies]
tempfile = { workspace = true }
assert_cmd = "2"
predicates = "3"
matter-core = { path = "../matter-core" }
camino = { workspace = true }
