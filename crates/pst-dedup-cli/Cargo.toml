[package]
name = "pst-dedup-cli"
version = "0.1.0"
edition = "2021"
description = "Command-line surface for PST deduplication (agent- and human-friendly)"
license = "MIT OR Apache-2.0"

[[bin]]
name = "pst-dedup"
path = "src/main.rs"

[dependencies]
pst-reader = { path = "../pst-reader" }
dedup-engine = { path = "../dedup-engine" }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
