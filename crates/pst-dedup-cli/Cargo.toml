[package]
name = "pst-dedup-cli"
version = "0.1.0"
edition = "2021"
description = "Command-line surface for PST deduplication and headless matter automation"
license = "LicenseRef-Proprietary"
license-file = "../../LICENSE"

[lib]
name = "pst_dedup_cli"
path = "src/lib.rs"

[[bin]]
name = "pst-dedup"
path = "src/main.rs"

[features]
default = []
# Opt-in S3 BlobStore activation on matter open (pass-through to matter-core).
# Build with `cargo build -p pst-dedup-cli --features cloud-s3` for hosted pilots.
cloud-s3 = ["matter-core/cloud-s3", "matter-service/cloud-s3"]

[dependencies]
pst-reader = { path = "../pst-reader" }
dedup-engine = { path = "../dedup-engine" }
pst-writer = { path = "../pst-writer" }
matter-core = { path = "../matter-core" }
matter-service = { path = "../matter-service" }
matter-platform = { path = "../matter-platform" }
process-runner = { path = "../process-runner" }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
camino = { workspace = true }
ctrlc = "3.5"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "signal"] }

[dev-dependencies]
tempfile = { workspace = true }
assert_cmd = "2"
predicates = "3"
matter-core = { path = "../matter-core" }
pst-reader = { path = "../pst-reader" }
camino = { workspace = true }
sha2 = { workspace = true }
serde_json = { workspace = true }
